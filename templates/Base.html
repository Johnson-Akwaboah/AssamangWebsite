<!DOCTYPE html>

<html lang="en">

<head>

    
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Domi Assamang Community
        {% endblock %}
    </title>

    <!-- SEO -->
    <meta name="description"
        content="Official website of Domi Assamang Community. News, events, projects, community development and social activities.">

    <meta name="keywords" content="Domi Assamang, Community, Ghana, Events, Projects, News">

    <meta name="author" content="Domi Assamang Community">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>


    <!-- ================= SOCIAL MEDIA BUTTONS ================= -->

    <div class="social-icons">

        <!-- WhatsApp -->
        <a href="https://wa.me/233248663558" target="_blank" rel="noopener noreferrer" class="whatsapp"
            aria-label="WhatsApp">

            <i class="bi bi-whatsapp"></i>

        </a>

        <!-- Facebook -->
        <a href="https://www.facebook.com/domiassamangcommunity" target="_blank" rel="noopener noreferrer"
            class="facebook" aria-label="Facebook">

            <i class="bi bi-facebook"></i>

        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/domiassamangcommunity" target="_blank" rel="noopener noreferrer"
            class="instagram" aria-label="Instagram">

            <i class="bi bi-instagram"></i>

        </a>

        <!-- Telegram -->
        <a href="https://t.me/domiassamangcommunity" target="_blank" rel="noopener noreferrer" class="telegram"
            aria-label="Telegram">

            <i class="bi bi-telegram"></i>

        </a>

        <!-- YouTube -->
        <a href="https://www.youtube.com/@domiassamangcommunity" target="_blank" rel="noopener noreferrer"
            class="youtube" aria-label="YouTube">

            <i class="bi bi-youtube"></i>

        </a>

    </div>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm fixed-top">

        <div class="container-fluid px-4">

            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">

                <img src="{{ url_for('static', filename='images/events/logo.jpeg') }}" width="45" height="45"
                    class="rounded-circle me-2" alt="Domi Assamang Community Logo">

                Domi Assamang

            </a>

            <!-- TOGGLE BUTTON -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse" id="navMenu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/about">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/announcements">
                            News
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/events">
                            Events
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/projects">
                            Projects
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/gallery">
                            Gallery
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/contact">
                            Contact
                        </a>
                    </li>


                </ul>

            </div>

        </div>

    </nav>

    <!-- SPACING FOR FIXED NAVBAR -->
    <div style="height: 80px;"></div>

    <!-- ================= PAGE CONTENT ================= -->

    <main class="container py-4">

        {% block content %}
        {% endblock %}

    </main>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-dark text-white text-center p-4 mt-5">

        <div class="container">

            <h5>
                Domi Assamang Community
            </h5>

            <p class="mb-2">
                Promoting unity, development, education and social progress.
            </p>

            <p class="mb-0">
                © 2026 Domi Assamang Community.
                All Rights Reserved.
            </p>

        </div>

    </footer>

    <!-- ================= BOOTSTRAP JS ================= -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ================= CUSTOM JS ================= -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    

</body>

</html>
